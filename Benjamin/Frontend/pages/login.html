<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../CSS/style.css" />
  </head>
  <body>
    <header><p>Logo</p></header>
    <main>
      <div id="form">
        <form id="loginForm">
          <div>
            <label for="email">Email :</label>
            <input
              type="text"
              name="email"
              id="emailInput"
              autofocus
              required
            />
          </div>
          <div>
            <label for="password">Password :</label>
            <input
              type="password"
              name="password"
              id="passInput"
              minlength="7"
              required
            />
          </div>
          <div>
            <button onclick="getRegisterForm()">S'inscrire</button>
            <button type="submit" id="submit">Valider</button>
          </div>
        </form>

        <form id="registerForm" style="display: none">
          <div>
            <label for="username">Username :</label>
            <input
              type="text"
              name="username"
              id="usernameRegisterInput"
              autofocus
              required
            />
          </div>
          <div>
            <label for="email">Email :</label>
            <input type="text" name="email" id="emailRegisterInput" required />
          </div>
          <div>
            <label for="password">Password :</label>
            <input
              type="password"
              name="password"
              id="passRegisterInput"
              required
              minlength="7"
            />
          </div>
          <div>
            <button onclick="getLoginForm()">Se connecter</button>
            <button type="submit" id="submit">Valider</button>
          </div>
        </form>
      </div>
    </main>
    <script src="../js/loginScript.js"></script>
  </body>
</html>
